<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Reservation Prediction</title>

    <!-- ✅ Link CSS correctly -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Hotel Reservation Prediction</h1>

    <form method="POST">

        <!-- Lead Time -->
        <label>Lead Time:</label>
        <input type="number" name="lead_time" required>

        <!-- Special Requests -->
        <label>No of Special Requests:</label>
        <input type="number" name="no_of_special_request" required>

        <!-- Avg Price -->
        <label>Avg Price Per Room:</label>
        <input type="number" step="0.01" name="avg_price_per_room" required>

        <!-- Arrival Month -->
        <label>Arrival Month:</label>
        <select name="arrival_month" required>
            <option value="1">Jan</option>
            <option value="2">Feb</option>
            <option value="3">Mar</option>
            <option value="4">Apr</option>
            <option value="5">May</option>
            <option value="6">Jun</option>
            <option value="7">Jul</option>
            <option value="8">Aug</option>
            <option value="9">Sep</option>
            <option value="10">Oct</option>
            <option value="11">Nov</option>
            <option value="12">Dec</option>
        </select>

        <!-- Arrival Date -->
        <label>Arrival Date:</label>
        <input type="number" name="arrival_date" required>

        <!-- Market Segment -->
        <label>Market Segment:</label>
        <select name="market_segment_type">
            <option value="0">Online</option>
            <option value="1">Offline</option>
            <option value="2">Corporate</option>
            <option value="3">Aviation</option>
        </select>

        <!-- Week Nights -->
        <label>No of Week Nights:</label>
        <input type="number" name="no_of_week_nights" required>

        <!-- Weekend Nights -->
        <label>No of Weekend Nights:</label>
        <input type="number" name="no_of_weekend_nights" required>

        <!-- Meal Plan -->
        <label>Meal Plan:</label>
        <select name="type_of_meal_plan">
            <option value="0">Not Selected</option>
            <option value="1">Meal Plan 1</option>
            <option value="2">Meal Plan 2</option>
            <option value="3">Meal Plan 3</option>
        </select>

        <!-- Room Type -->
        <label>Room Type:</label>
        <select name="room_type_reserved">
            <option value="0">Room Type 1</option>
            <option value="1">Room Type 2</option>
            <option value="2">Room Type 3</option>
            <option value="3">Room Type 4</option>
            <option value="4">Room Type 5</option>
            <option value="5">Room Type 6</option>
            <option value="6">Room Type 7</option>
        </select>

        <!-- Submit -->
        <button type="submit">Predict</button>

    </form>

    <!-- ✅ Prediction Output -->
    {% if prediction is not none %}
        <div class="result">
            <h2>
                {% if prediction == 1 %}
                    ❌ Booking will be Cancelled
                {% else %}
                    ✅ Booking will NOT be Cancelled
                {% endif %}
            </h2>
        </div>
    {% endif %}

</div>

</body>
</html>
